<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What Your Invoice Should Be</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #F5F2ED;
  --ink: #1A1A18;
  --rule: #C8C3BA;
  --accent: #D4380D;
  --green: #1A6B3A;
  --green-light: #EBF5EF;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: var(--sans);
  display: flex;
  justify-content: center;
  padding: 2rem;
}

.page {
  max-width: 560px;
  width: 100%;
}

/* Header */
.header {
  border-top: 3px solid var(--ink);
  border-bottom: 1px solid var(--rule);
  padding: 1.5rem 0;
  margin-bottom: 2rem;
}

.header-label {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
}

h1 {
  font-family: var(--mono);
  font-size: 1.4rem;
}

.subtitle {
  margin-top: 0.5rem;
  font-size: 0.85rem;
  color: #666;
}

/* Input */
.input-row {
  display: flex;
  border: 1.5px solid var(--ink);
  background: white;
}

.currency {
  background: var(--ink);
  color: white;
  padding: 0.8rem;
  font-family: var(--mono);
}

input {
  flex: 1;
  border: none;
  padding: 0.8rem;
  font-size: 1.2rem;
  font-family: var(--mono);
}

/* Result */
.result {
  margin-top: 1.5rem;
  display: none;
}

.result.visible {
  display: block;
}

.card {
  background: var(--green-light);
  border: 1px solid var(--green);
  padding: 1.2rem;
}

.amount {
  font-size: 2rem;
  font-family: var(--mono);
  color: var(--green);
}

.breakdown {
  margin-top: 1rem;
  font-size: 0.9rem;
}

button {
  margin-top: 1rem;
  width: 100%;
  padding: 0.7rem;
  background: var(--ink);
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>
<div class="page">

  <div class="header">
    <div class="header-label">Finance Tool</div>
    <h1>What Your Invoice Should Be</h1>
    <p class="subtitle">
      Enter a budget that includes 8.1% TVA to get the correct invoice amount.
    </p>
  </div>

  <div class="input-row">
    <div class="currency">CHF</div>
    <input id="budget" placeholder="0.00">
  </div>

  <div class="result" id="result">
    <div class="card">
      <div>Invoice (excl. TVA)</div>
      <div class="amount" id="invoice">—</div>

      <div class="breakdown">
        TVA: CHF <span id="tva">—</span><br>
        Total: CHF <span id="total">—</span>
      </div>
    </div>

    <button onclick="copy()">Copy invoice amount</button>
  </div>

</div>

<script>
const TVA = 0.081;
let current = null;

function roundCHF(n) {
  return Math.round((n + Number.EPSILON) * 100) / 100;
}

function fmt(n) {
  return n.toLocaleString('de-CH', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function clean(val) {
  return val.replace(/'/g, '').replace(',', '.');
}

document.getElementById('budget').addEventListener('input', (e) => {
  const val = clean(e.target.value);
  const budget = parseFloat(val);

  if (!val || isNaN(budget)) {
    document.getElementById('result').classList.remove('visible');
    return;
  }

  const invoice = roundCHF(budget / (1 + TVA));
  const tva = roundCHF(budget - invoice);

  document.getElementById('invoice').textContent = "CHF " + fmt(invoice);
  document.getElementById('tva').textContent = fmt(tva);
  document.getElementById('total').textContent = fmt(budget);

  current = fmt(invoice);
  document.getElementById('result').classList.add('visible');
});

function copy() {
  if (!current) return;

  navigator.clipboard.writeText(current).then(() => {
    alert("Copied: " + current);
  });
}
</script>

</body>
</html>
